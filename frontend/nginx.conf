map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (strip /api prefix)
    location ~ ^/api/(.*)$ {
        set $upstream http://basileia_api_wp_go_backend:8080/$1$is_args$args;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SSE settings
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Proxy Swagger Docs
    location /docs/ {
        set $upstream_docs http://basileia_api_wp_go_backend:8080;
        proxy_pass $upstream_docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy webhook
    location = /webhook {
        set $upstream_wh http://basileia_api_wp_go_backend:8080/webhook;
        proxy_pass $upstream_wh;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket proxy
    location = /ws {
        set $upstream_ws http://basileia_api_wp_go_backend:8080/ws;
        proxy_pass $upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}
