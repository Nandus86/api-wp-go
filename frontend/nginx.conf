server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Strip /api prefix when forwarding to backend if backend expects root paths
        # But wait, backend handles /device directly. So we rewrite.
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade"; # Important for SSE
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # SSE settings
        proxy_buffering off;
        proxy_read_timeout 100s;

    }

    # Proxy Swagger Docs
    location /docs/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy webhook
    location /webhook {
        proxy_pass http://app:8080/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# WhatsApp API - Primary Route (3179)
server {
    listen 80;
    server_name apiwp.nandus.com.br 10.0.0.139;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SSE settings
        proxy_buffering off;
        proxy_read_timeout 100s;
    }

    location /docs/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /webhook {
        proxy_pass http://app:8080/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

