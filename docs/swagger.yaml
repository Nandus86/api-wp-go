basePath: /api
definitions:
  github_com_user_whatsmeow-basileia_internal_infrastructure_whatsapp.Instance:
    properties:
      id:
        type: string
      jid:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  github_com_user_whatsmeow-basileia_internal_infrastructure_whatsapp.MessageStatGroup:
    properties:
      count:
        type: integer
      direction:
        type: string
      hour:
        type: string
    type: object
  github_com_user_whatsmeow-basileia_pkg_logger.LogEntry:
    properties:
      level:
        type: string
      message:
        type: string
      time:
        type: string
    type: object
  internal_api.CreateDeviceRequest:
    properties:
      name:
        type: string
    type: object
  internal_api.SendCopyButtonRequest:
    properties:
      copy_code:
        description: The actual content to be copied (e.g. PIX payload)
        type: string
      copy_text:
        description: The button display text (e.g. "Copy PIX")
        type: string
      device_id:
        type: string
      footer:
        type: string
      message:
        type: string
      number:
        type: string
      title:
        type: string
    type: object
  internal_api.SendMediaRequest:
    properties:
      base64:
        description: Base64 encoded media string (e.g. data:image/png;base64,...)
        type: string
      caption:
        type: string
      device_id:
        type: string
      fileName:
        type: string
      media_url:
        description: Public URL to download the media from
        type: string
      mimetype:
        type: string
      number:
        type: string
      type:
        description: image, video, document, audio
        type: string
    type: object
  internal_api.SendMessageRequest:
    properties:
      buttons:
        items:
          type: string
        type: array
      device_id:
        type: string
      footer:
        type: string
      message:
        type: string
      number:
        type: string
      title:
        type: string
      type:
        description: button, list
        type: string
    type: object
  internal_api.UazInitRequest:
    properties:
      adminField01:
        type: string
      adminField02:
        type: string
      browser:
        type: string
      fingerprintProfile:
        type: string
      name:
        type: string
      systemName:
        type: string
    type: object
  internal_api.UazInitResponse:
    properties:
      instance:
        $ref: '#/definitions/internal_api.UazInstance'
      response:
        type: string
      token:
        type: string
    type: object
  internal_api.UazInstance:
    properties:
      created:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      systemName:
        type: string
      token:
        type: string
    type: object
  internal_api.UazSendMessageRequest:
    properties:
      address:
        description: Location
        type: string
      amount:
        description: payment / pix
        type: number
      async:
        type: boolean
      caption:
        type: string
      choices:
        items:
          type: string
        type: array
      file:
        type: string
      filename:
        type: string
      fullName:
        description: Contact
        type: string
      latitude:
        type: number
      listButton:
        description: Menu / List
        type: string
      longitude:
        type: number
      name:
        type: string
      number:
        type: string
      phoneNumber:
        type: string
      pixKey:
        type: string
      pixName:
        type: string
      pixType:
        type: string
      presence:
        description: Presence
        type: string
      text:
        type: string
      type:
        description: media fields
        type: string
    type: object
info:
  contact: {}
  description: API for WhatsApp automation using WhatsMeow.
  title: WhatsMeow Basileia API
  version: "1.0"
paths:
  /device:
    get:
      description: Returns a list of all active instances
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_user_whatsmeow-basileia_internal_infrastructure_whatsapp.Instance'
            type: array
      summary: List devices
      tags:
      - device
    post:
      consumes:
      - application/json
      description: Generates a new device ID and initializes a client
      parameters:
      - description: Device Name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.CreateDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new device
      tags:
      - device
  /device/{id}:
    delete:
      description: Deletes an instance, terminates connection and drops metadata
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete device
      tags:
      - device
  /device/{id}/qr:
    get:
      description: Connects to SSE stream to receive QR codes for pairing
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - text/event-stream
      responses: {}
      summary: Get QR code stream
      tags:
      - device
  /device/{id}/reconnect:
    post:
      description: Reconnects a previously paired device
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reconnect device
      tags:
      - device
  /device/{id}/rename:
    put:
      consumes:
      - application/json
      description: Updates the name of an existing device/instance
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: string
      - description: New Device Name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.CreateDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Rename a device
      tags:
      - device
  /device/{id}/status:
    get:
      description: Returns the connection status of the device
      parameters:
      - description: Device ID (JID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get device status
      tags:
      - device
  /instance/connect:
    post:
      consumes:
      - application/json
      description: Connects the instance to WhatsApp and returns a base64 QR Code
        if not logged in.
      parameters:
      - description: Instance Token
        in: header
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Connection status or QR code
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 'Unauthorized: missing token'
          schema:
            type: string
        "404":
          description: Device not found or not loaded
          schema:
            type: string
        "500":
          description: Failed to connect
          schema:
            type: string
        "504":
          description: Timeout waiting for QR
          schema:
            type: string
      summary: Connect UazAPI Instance
      tags:
      - uazapi-instance
  /instance/init:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp instance compatible with UazAPI guidelines.
        Returns a token to be used in the header for subsequent requests.
      parameters:
      - description: Instance Configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.UazInitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.UazInitResponse'
        "400":
          description: Invalid request body or missing name
          schema:
            type: string
        "500":
          description: Failed to create instance
          schema:
            type: string
      summary: Create UazAPI Instance
      tags:
      - uazapi-instance
  /logs:
    get:
      description: Returns the latest logs stored in memory
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_user_whatsmeow-basileia_pkg_logger.LogEntry'
            type: array
      summary: Get system logs
      tags:
      - app
  /message/interactive/button:
    post:
      consumes:
      - application/json
      description: Sends an interactive button message (Queued)
      parameters:
      - description: Message Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send an interactive button message
      tags:
      - message
  /message/interactive/copy:
    post:
      consumes:
      - application/json
      description: Sends an interactive button message specifically designed to copy
        text (Queued)
      parameters:
      - description: Copy Button Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.SendCopyButtonRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send an interactive copy button (eg. Copy PIX)
      tags:
      - message
  /message/media:
    post:
      consumes:
      - application/json
      description: Sends a media message (Queued)
      parameters:
      - description: Media Message Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.SendMediaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send a media message (image, video, document, audio)
      tags:
      - message
  /message/presence:
    post:
      consumes:
      - application/json
      description: |-
        Sends different types of messages (contact, location, status, menu, carousel, payment, pix, presence) via UazAPI format.
        To send presence, use `/message/presence` with `{ "number": "...", "presence": "composing" }`.
        For menus/lists, use `/send/menu` with `{ "number": "...", "listButton": "Ver", "choices": ["[Geral]", "Opção 1|op1"] }`.
      parameters:
      - description: Instance Token
        in: header
        name: token
        required: true
        type: string
      - description: Message Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.UazSendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Message queued successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            type: string
        "401":
          description: 'Unauthorized: missing token'
          schema:
            type: string
        "500":
          description: Failed to enqueue message
          schema:
            type: string
      summary: Send UazAPI Message (Various Types)
      tags:
      - uazapi-messages
  /message/send:
    post:
      consumes:
      - application/json
      description: Sends a plain text message (Queued)
      parameters:
      - description: Message Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
